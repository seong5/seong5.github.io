<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">CORS 우회 프록시와 이원화된 API 클라이언트: serverApi와 clientApi의 토큰 주입 전략</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">서버 컴포넌트는 auth()로 세션 토큰을 자동 주입하는 serverApi를 쓰고, 클라이언트 컴포넌트는 Next.js rewrites 프록시를 통해 axios 인터셉터로 토큰을 주입하는 clientApi를 써서 CORS 없이 백엔드에 접근하는 구조</desc>
