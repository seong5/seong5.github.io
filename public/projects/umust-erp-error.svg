<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">getErrorMessage 함수가 백엔드 본문, HTTP 상태별 안내, 네트워크 타임아웃, fallback 순으로 우선순위를 따라 내려가며, 무의미한 일반 메시지는 건너뛰는 구조</desc>
